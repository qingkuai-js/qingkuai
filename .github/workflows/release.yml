name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        type: string
        required: false
        description: "Optional tag to release (for example: v1.0.66). Leave empty to auto-create from package version."

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ "$EVENT_NAME" == "push" ]]; then
            echo "value=$REF_NAME" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -n "$INPUT_TAG" ]]; then
            echo "value=$INPUT_TAG" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          package_version="$(node -p 'require("./package.json").version')"
          echo "value=v$package_version" >> "$GITHUB_OUTPUT"

      - name: Ensure tag exists on workflow dispatch
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          git fetch origin --tags --prune

          if git rev-parse --verify --quiet "refs/tags/$TAG" >/dev/null; then
            echo "Tag already exists: $TAG"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
            echo "Created and pushed tag: $TAG"
          fi

      - name: Checkout resolved tag
        env:
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          git fetch origin --tags --prune
          git checkout "refs/tags/$TAG"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Diagnose npm auth context
        run: |
          npm --version
          npm config get registry
          if [[ -f "$HOME/.npmrc" ]]; then
            sed -E 's#(//registry\.npmjs\.org/:_authToken=).*#\1***#' "$HOME/.npmrc"
          else
            echo "No ~/.npmrc found"
          fi

      - name: Diagnose workflow context
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          REPOSITORY: ${{ github.repository }}
          WORKFLOW: ${{ github.workflow }}
        run: |
          echo "event=$EVENT_NAME"
          echo "ref=$REF"
          echo "ref_name=$REF_NAME"
          echo "actor=$ACTOR"
          echo "repository=$REPOSITORY"
          echo "workflow=$WORKFLOW"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Validate tag equals package version
        env:
          TAG: ${{ steps.tag.outputs.value }}
        run: pnpm exec tsx scripts/release.ts validate-tag "$TAG"

      - name: Build package
        run: pnpm run build

      - name: Pack npm tarball
        run: npm pack

      - name: Publish package to npm (Trusted Publishing)
        run: npm publish --access public --provenance

      - name: Generate release notes from CHANGELOG
        id: notes
        env:
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          notes_file="release-notes.md"
          pnpm exec tsx scripts/release.ts notes "$TAG" "$notes_file"

          echo "path=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.tag.outputs.value }}
          tag_name: ${{ steps.tag.outputs.value }}
          body_path: ${{ steps.notes.outputs.path }}
          files: |
            qingkuai-*.tgz
