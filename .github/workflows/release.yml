name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to release (for example: v1.0.63)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ -n "$INPUT_TAG" ]]; then
            echo "value=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "value=$REF_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ steps.tag.outputs.value }}

      - name: Ensure tag commit is on origin/main
        env:
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          git fetch origin main --prune
          tag_commit="$(git rev-list -n 1 "$TAG")"

          if ! git merge-base --is-ancestor "$tag_commit" origin/main; then
            echo "Release is allowed only for tags that point to commits on origin/main." >&2
            echo "Tag: $TAG" >&2
            echo "Commit: $tag_commit" >&2
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Read version from package.json
        id: package-version
        run: echo "value=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Validate tag equals package version
        env:
          TAG: ${{ steps.tag.outputs.value }}
          PACKAGE_VERSION: ${{ steps.package-version.outputs.value }}
        run: |
          expected_tag="v$PACKAGE_VERSION"
          if [[ "$TAG" != "$expected_tag" ]]; then
            echo "Tag $TAG does not match package.json version $PACKAGE_VERSION" >&2
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run typecheck
        run: pnpm run typecheck

      - name: Run lint
        run: pnpm run lint

      - name: Run unit tests
        run: pnpm run test:units

      - name: Build package
        run: pnpm run build

      - name: Pack npm tarball
        run: npm pack

      - name: Generate release notes from CHANGELOG
        id: notes
        env:
          TAG: ${{ steps.tag.outputs.value }}
          VERSION: ${{ steps.package-version.outputs.value }}
        run: |
          notes_file="release-notes.md"
          awk -v version="$VERSION" '
            BEGIN {
              in_section = 0
            }
            $0 ~ "^## \\[" version "\\]" {
              in_section = 1
            }
            in_section {
              if ($0 ~ /^## \[/ && $0 !~ "^## \\[" version "\\]") {
                exit
              }
              print
            }
          ' CHANGELOG.md > "$notes_file"

          if [[ ! -s "$notes_file" ]]; then
            {
              echo "## $TAG"
              echo
              echo "Release created from tag $TAG."
            } > "$notes_file"
          fi

          echo "path=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: qingkuai ${{ steps.tag.outputs.value }}
          tag_name: ${{ steps.tag.outputs.value }}
          target_commitish: ${{ steps.tag.outputs.value }}
          body_path: ${{ steps.notes.outputs.path }}
          files: |
            qingkuai-*.tgz
